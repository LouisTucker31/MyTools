<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF7D"/>
      <stop offset="100%" stop-color="#1B7A45"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <!-- Banknote icon: note body -->
  <rect x="162" y="362" width="700" height="420" rx="48" ry="48" fill="none" stroke="white" stroke-width="52"/>
  <!-- Centre oval (value circle) -->
  <ellipse cx="512" cy="572" rx="108" ry="108" fill="none" stroke="white" stroke-width="48"/>
  <!-- Left oval decoration -->
  <ellipse cx="282" cy="572" rx="52" ry="52" fill="none" stroke="white" stroke-width="40"/>
  <!-- Right oval decoration -->
  <ellipse cx="742" cy="572" rx="52" ry="52" fill="none" stroke="white" stroke-width="40"/>
  <!-- Horizontal lines on note -->
  <line x1="162" y1="470" x2="862" y2="470" stroke="white" stroke-width="36" opacity="0.25"/>
  <line x1="162" y1="674" x2="862" y2="674" stroke="white" stroke-width="36" opacity="0.25"/>
</svg>
