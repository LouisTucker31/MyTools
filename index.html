<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Tools" />
  <meta name="theme-color" content="#0a2e14" />
  <title>My Tools</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Fixed background layer — colour blends happen here -->
  <div id="bg"></div>

  <!-- Fixed header — never moves -->
  <header id="header">
    <h1 id="app-title">My Tools</h1>
    <div id="pill">
      <span id="pill-label">Budget</span>
    </div>
  </header>

  <!-- Swipeable carousel -->
  <div id="carousel-viewport">
    <div id="strip">
      <!-- Pages are injected here by app.js -->
    </div>
  </div>

  <script src="app.js"></script>
  <script src="pages/budget.js"></script>
</body>
</html>
