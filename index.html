<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MyTools" />
  <meta name="theme-color" content="#0a2e14" />
  <title>MyTools</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180-v2.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152-v2.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167-v2.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180-v2.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Single app shell — translated by JS to resist iOS keyboard push -->
  <div id="app">

    <!-- Fixed background layer — colour blends happen here -->
    <div id="bg"></div>

    <!-- Fixed header — never moves -->
    <header id="header">
      <h1 id="app-title">MyTools</h1>
      <div id="pill">
        <span id="pill-label">Budget</span>
      </div>
    </header>

    <!-- Swipeable carousel -->
    <div id="carousel-viewport">
      <div id="strip">
        <!-- Pages are injected here by app.js -->
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script src="pages/budget.js"></script>
</body>
</html>
